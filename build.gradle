                    }
                }
            } catch (Exception e) { println "Checkstyle parse error for ${sp.name}: ${e.message}" }
        }
        outputFile.parentFile.mkdirs()
        outputFile.text = buildAggregateHtml(
            "Checkstyle Aggregate Report", "#7a6da7",
            ["Project", "File", "Line", "Severity", "Source", "Message"], rows,
            "${rows.size()} violation(s)")
        println "Checkstyle aggregate report: ${outputFile.toURI()}"
    }
}

// ── aggregateReports convenience task ────────────────────────────────────────
// Runs all aggregate reports at once. Individual tasks can still be run separately.
tasks.register("aggregateReports") {
    group = "verification"
    description = "Generates all aggregate reports (tests, coverage, PMD, SpotBugs, Checkstyle, Javadoc)."
    dependsOn("aggregateTestReport", "aggregateJacocoReport", "aggregatePmdReport", "aggregateSpotBugsReport", "aggregateCheckstyleReport", "allJavadoc")
}

// ── fullBuild lifecycle task ──────────────────────────────────────────────────
// Builds, publishes and generates every aggregate report in one shot.
// Intended to be run as: gradle clean fullBuild
// (clean is kept separate to avoid circular dependencies with subproject tasks.)
tasks.register("fullBuild") {
    group = "build"
    description = "Builds all modules, publishes artifacts, and generates all aggregate reports. Run as: gradle clean fullBuild"
    dependsOn("build", "publish", "aggregateReports")
}

// ── HTML report helper ────────────────────────────────────────────────────────
// Builds a simple but complete single-page HTML table report.
// Used by aggregatePmdReport and aggregateSpotBugsReport.
def buildAggregateHtml(String title, String accentColor, List<String> headers, List rows, String summary) {
    def escape = { String s -> s?.replace("&", "&amp;")?.replace("<", "&lt;")?.replace(">", "&gt;") ?: "" }
    def thead = headers.collect { "<th>${it}</th>" }.join("")
    def tbody = rows.collect { row ->
        "<tr>${(row as List).collect { cell -> "<td>${escape(cell?.toString())}</td>" }.join("")}</tr>"
    }.join("\n")
    """\
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>${title}</title>
<style>
body  { font-family: sans-serif; margin: 20px; }
h1    { color: ${accentColor}; }
table { border-collapse: collapse; width: 100%; margin-top: 12px; }
th    { background: ${accentColor}; color: white; padding: 6px 10px; text-align: left; }
td    { border: 1px solid #ddd; padding: 4px 8px; vertical-align: top; word-break: break-word; }
tr:nth-child(even) { background: #f9f9f9; }
</style></head><body>
<h1>${title}</h1>
<p>Total: <b>${summary}</b></p>
${rows.isEmpty() ? "<p>No issues found. ✓</p>" : "<table><tr>${thead}</tr>\n${tbody}\n</table>"}
</body></html>"""
}

