def versionJunit       = "6.1.1"
def versionLombok      = "1.18.47"
def versionPmd         = "7.26.0"
def versionSbContrib   = "7.7.4"
def versionSpotBugs    = "4.10.2"
def versionSlf4j       = "2.0.18"
def versionSqlite      = "3.53.2.0"
