// ── Aggregate JaCoCo Coverage Report ─────────────────────────────────────────
// Note: the jacoco-report-aggregation plugin is incompatible with Gradle 9 in this
// project setup, so we use a plain JacocoReport task that combines all .exec files.
tasks.register("aggregateJacocoReport", JacocoReport) {
    dependsOn(subprojects.collect { it.tasks.named("test") })
    group = "verification"
    description = "Generates an aggregate JaCoCo coverage report for all subprojects."
    executionData.setFrom(
        subprojects.collect { sp -> fileTree(sp.buildDir).include("jacoco/*.exec") }
    )
    sourceDirectories.setFrom(
        subprojects.collect { sp -> sp.sourceSets.main.allJava.srcDirs }.flatten().findAll { it.exists() }
    )
    classDirectories.setFrom(
        subprojects.collect { sp -> sp.sourceSets.main.output.classesDirs }.flatten()
    )
    reports {
        html.required = true
        xml.required  = false
        csv.required  = false
        html.outputLocation = layout.buildDirectory.dir("reports/jacoco/aggregate")
    }
}

// ── Aggregate PMD Report ──────────────────────────────────────────────────────
tasks.register("aggregatePmdReport") {
    dependsOn(subprojects.collect { sp -> sp.tasks.withType(Pmd) }.flatten())
    group = "verification"
    description = "Generates an aggregate PMD HTML report for all subprojects."
    def outputFile = file("${buildDir}/reports/pmd/aggregate.html")
    outputs.file(outputFile)

    doLast {
        def rows = []
        subprojects.each { sp ->
            def xmlFile = new File(sp.buildDir, "reports/pmd/main.xml")
            if (!xmlFile.exists()) return
            try {
                new groovy.xml.XmlParser().parse(xmlFile).file.each { fileNode ->
                    def path = fileNode.@name.replace(rootDir.absolutePath, "").replace("\\", "/")
                    fileNode.violation.each { v ->
                        rows << [sp.name, path, v.@beginline, v.@priority, v.@rule, v.text().trim()]
                    }
                }
            } catch (Exception e) { println "PMD parse error for ${sp.name}: ${e.message}" }
        }
        outputFile.parentFile.mkdirs()
        outputFile.text = buildAggregateHtml(
            "PMD Aggregate Report", "#4a6da7",
            ["Project", "File", "Line", "P", "Rule", "Message"], rows,
            "${rows.size()} violation(s)")
        println "PMD aggregate report: ${outputFile.toURI()}"
    }
}

// ── Aggregate SpotBugs Report ─────────────────────────────────────────────────
tasks.register("aggregateSpotBugsReport") {
    dependsOn(subprojects.collect { sp -> sp.tasks.named("spotbugsMain") })
    group = "verification"
    description = "Generates an aggregate SpotBugs HTML report for all subprojects."
    def outputFile = file("${buildDir}/reports/spotbugs/aggregate.html")
    outputs.file(outputFile)

    doLast {
        def rows = []
        subprojects.each { sp ->
            def xmlFile = new File(sp.buildDir, "reports/spotbugs/main.xml")
            if (!xmlFile.exists()) return
            try {
                new groovy.xml.XmlParser().parse(xmlFile).BugInstance.each { bug ->
                    def sl  = bug.SourceLine ? bug.SourceLine[0] : null
                    def msg = (bug.LongMessage ?: bug.ShortMessage)
                    rows << [sp.name, bug.@category, bug.@type, bug.@rank,
                             bug.Class  ? bug.Class[0].@classname : "",
                             bug.Method ? bug.Method[0].@name     : "",
                             sl ? sl.@sourcepath : "", sl ? sl.@start : "",
                             msg ? msg[0].text().trim() : ""]
                }
            } catch (Exception e) { println "SpotBugs parse error for ${sp.name}: ${e.message}" }
        }
        outputFile.parentFile.mkdirs()
        outputFile.text = buildAggregateHtml(
            "SpotBugs Aggregate Report", "#a74a4a",
            ["Project", "Category", "Type", "Rank", "Class", "Method", "File", "Line", "Message"], rows,
            "${rows.size()} bug(s)")
        println "SpotBugs aggregate report: ${outputFile.toURI()}"
    }
}

// ── Aggregate Checkstyle Report ───────────────────────────────────────────────
tasks.register("aggregateCheckstyleReport") {
    dependsOn(subprojects.collect { sp -> sp.tasks.named("checkstyleMain") })
    group = "verification"
    description = "Generates an aggregate Checkstyle HTML report for all subprojects."
    def outputFile = file("${buildDir}/reports/checkstyle/aggregate.html")
    outputs.file(outputFile)

    doLast {
        def rows = []
        subprojects.each { sp ->
            def xmlFile = new File(sp.buildDir, "reports/checkstyle/main.xml")
            if (!xmlFile.exists()) return
            try {
                new groovy.xml.XmlParser().parse(xmlFile).file.each { fileNode ->
                    def path = fileNode.@name.replace(rootDir.absolutePath, "").replace("\\", "/")
                    fileNode.error.each { e ->
